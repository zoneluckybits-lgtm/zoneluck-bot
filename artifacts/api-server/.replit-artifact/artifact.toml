kind = "api"
previewPath = "/"
title = "Zone Luck Bot"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"
deploymentTarget = "vm"
primaryArtifact = true

[[services]]
localPort = 8080
name = "Zone Luck Bot"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.run]
args = ["sh", "-c", "cd bot && pip install -r requirements.txt -q && python main.py"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/"
