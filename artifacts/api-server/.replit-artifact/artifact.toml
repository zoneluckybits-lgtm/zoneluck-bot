kind = "api"
previewPath = "/api"
title = "Zone Luck Bot"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"
deploymentTarget = "vm"

[[services]]
localPort = 8080
name = "Zone Luck Bot"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.run]
args = ["sh", "-c", "cd bot && pip install -r requirements.txt -q && python main.py"]
